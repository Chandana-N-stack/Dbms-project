<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | EmergencyMS</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Tabler Icons -->
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">

<style>
body{
    font-family:Inter, sans-serif;
    background:#f4f7fb;
}

/* SIDEBAR (MATCH AMBULANCE STYLE) */
.sidebar{
    background:#0f2744;
    min-height:100vh;
    color:white;
}

.sidebar h4{
    font-size:18px;
    font-weight:700;
}

.sidebar a{
    display:block;
    padding:10px 12px;
    color:#cbd5e1;
    text-decoration:none;
    border-radius:6px;
    margin-bottom:5px;
}

.sidebar a:hover{
    background:rgba(255,255,255,0.1);
    color:white;
}

.sidebar a.active{
    background:#185FA5;
    color:white;
}

/* CARDS (MATCH AMBULANCE STYLE) */
.card{
    border-radius:12px;
    border:1px solid #e4e8ef;
}

/* BUTTONS */
.btn-primary{
    background:#185FA5;
    border:none;
}
.btn-primary:hover{
    filter:brightness(1.1);
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-2 sidebar p-3">

    <h4 class="mb-4">
        <i class="ti ti-ambulance"></i> EmergencyMS
    </h4>

    <a href="dashboard.html" class="active">
        <i class="ti ti-layout-dashboard"></i> Dashboard
    </a>

    <a href="emergency.html">
        <i class="ti ti-alarm"></i> Emergency
    </a>

    <a href="hospitals.html">
        <i class="ti ti-building-hospital"></i> Hospitals
    </a>

    <a href="ambulances.html">
        <i class="ti ti-ambulance"></i> Ambulances
    </a>

    <a href="patients.html">
        <i class="ti ti-users"></i> Patients
    </a>

    <a href="index.html" style="margin-top:30px;color:#fca5a5;">
        <i class="ti ti-logout"></i> Logout
    </a>

</div>

<!-- MAIN CONTENT -->
<div class="col-md-10 p-4">

    <!-- TOPBAR -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h3 class="mb-0">Dashboard Overview</h3>
            <small class="text-muted">Emergency Management System</small>
        </div>

        <button class="btn btn-primary">
            <i class="ti ti-plus"></i> Quick Action
        </button>

    </div>

    <!-- STATS -->
    <div class="row g-3 mb-4">

        <div class="col-md-3">
            <div class="card p-3 text-center">
                <h6>Total Patients</h6>
                <h3 id="totalPatients">0</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 text-center">
                <h6>Total Hospitals</h6>
                <h3 id="totalHospitals">4</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 text-center">
                <h6>Available Beds</h6>
                <h3>248</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 text-center">
                <h6>Ambulances</h6>
                <h3 id="totalAmbulances">4</h3>
            </div>
        </div>

    </div>

    <!-- QUICK ACTIONS -->
    <div class="row g-2 mb-4">

        <div class="col-md-3">
            <button class="btn btn-primary w-100">Add Hospital</button>
        </div>

        <div class="col-md-3">
            <button class="btn btn-success w-100">Add Ambulance</button>
        </div>

        <div class="col-md-3">
            <button class="btn btn-warning w-100">Register Patient</button>
        </div>

        <div class="col-md-3">
            <button class="btn btn-danger w-100">New Emergency</button>
        </div>

    </div>

    <!-- TABLE -->
    <div class="card p-3">

        <h5 class="mb-3">Active Emergencies</h5>

        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Patient</th>
                    <th>Type</th>
                    <th>Severity</th>
                    <th>Hospital</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="emergencyTableBody"></tbody>
        </table>

    </div>

</div>

</div>
</div>

<!-- JS (keep your logic same) -->
<script>
function load(key){
    return JSON.parse(localStorage.getItem(key)) || [];
}

function render(){
    let pts = load("patients");
    document.getElementById("totalPatients").innerText = pts.length;
}

render();
</script>

</body>
</html>
