<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">

  <link href="../css/style.css" rel="stylesheet">
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="sidebar-brand">
      <h1><i class="ti ti-ambulance"></i> EmergencyMS</h1>
      <span>Admin Panel</span>
    </div>

    <nav class="sidebar-nav">

      <a href="dashboard.html" class="nav-link">
        <i class="ti ti-layout-dashboard"></i>
        Dashboard
      </a>

      <a href="emergency.html" class="nav-link">
        <i class="ti ti-alert-circle"></i>
        Emergency
      </a>

      <a href="hospitals.html" class="nav-link">
        <i class="ti ti-building-hospital"></i>
        Hospitals
      </a>

      <a href="ambulance.html" class="nav-link">
        <i class="ti ti-ambulance"></i>
        Ambulances
      </a>

      <a href="patients.html" class="nav-link active">
        <i class="ti ti-users"></i>
        Patients
      </a>

    </nav>

  </div>

  <!-- Main Content -->
  <div class="main-content">

    <div class="topbar">
  <h2>Patients Management</h2>
</div>

<div class="card mb-4">

  <h4 class="mb-3">Add New Patient</h4>

  <form id="patientForm">

    <div class="mb-3">
      <label class="form-label">Patient Name</label>
      <input type="text" id="patientName" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Disease / Condition</label>
      <input type="text" id="patientCondition" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Hospital</label>
      <input type="text" id="patientHospital" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary">
      Save Patient
    </button>

  </form>

</div>

 <div class="row g-4" id="patientsContainer">

 </div>   

</div>
<script src="../JS/script.js"></script>
</body>
</html>
